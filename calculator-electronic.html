<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic Calculator - USIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-right-nav">
        <button class="btn-logout" onclick="logoutUser()">Log Out</button>
    </div>

    <header>
       <h1>CGPA CALCULATOR</h1>
       <p>(Bachelor of Electronic Engineering with Honours)</p>
    </header>

    <div id="programSelection" class="container" style="display: none;">
        <h2>Choose Your Program</h2>
    </div>

    <div class="student-info-card">
    <div class="info-row">
        <span class="info-label">NAME:</span>
        <span class="info-value" id="display-nama">LOADING...</span>
    </div>
    <div class="info-row">
        <span class="info-label">MATRIC NO.:</span>
        <span class="info-value" id="display-matrik">-------</span>
    </div>
   </div>

    <div id="calculatorPage" class="container" style="display: block;">

        <div class="semester-selector">
            <label>I am currently in: </label>
            <select id="currentSemester" onchange="updateVisibleSemesters()">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
            </select>
        </div>

        <div class="tabs" id="semesterTabs"></div>
        <div id="semesterContent"></div>

        <div class="results" id="results">
            <h3>Results</h3>
            <div class="result-box">
                <div class="result-item">
                    <span>Current Semester GPA: </span>
                    <span id="currentGPA" class="gpa-value">-</span>
                </div>
                <div class="result-item cgpa-main">
                    <span>Overall CGPA:</span>
                    <span id="overallCGPA" class="cgpa-value">-</span>
                </div>
            </div>
            <div id="dekanMessage" class="dekan-alert" style="display: none;"></div>
        </div>

        <div class="action-buttons">
            <button onclick="calculateAll()" class="btn-primary">Calculate CGPA</button>
            <button onclick="saveData()" class="btn-secondary">Save Data</button>
            <button onclick="clearAll()" class="btn-danger">Reset All</button>
        </div>

        <div class="prediction-section">
            <h3>🎯 CGPA Prediction Calculator</h3>
            <div class="prediction-input">
                <label>Your desired Target CGPA:</label>
                <input type="number" id="targetCGPA" min="0" max="4" step="0.01" placeholder="Example: 3.75">
                <button onclick="predictGrades()" class="btn-predict">Predict Grade</button>

                <button onclick="printReport()" class="btn-print" style="background: #2d3748; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 5px;">
                    🖨️ Print Slip
                </button>
            </div>
            <div id="predictionResults" class="prediction-results"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 | Developed by Hasyf</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // Fungsi untuk suntik fail JS dengan timestamp unik
        function loadScript(src) {
            const script = document.createElement('script');
            // Date.now() akan bagi nombor unik (cth: 1714283456)
            script.src = src + "?v=" + Date.now();
            document.head.appendChild(script);
        }

        // Panggil fail-fail Hasif secara automatik
        loadScript("auth.js");
        loadScript("data.js");
        loadScript("script.js");
    </script>
    <script>
        window.onload = function() {
            // Kita panggil fungsi selectProgram yang ada dalam script.js secara automatik
            if (typeof selectProgram === "function") {
                selectProgram('Electronic');
            }
        };
    </script>
</body>
</html>
