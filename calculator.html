<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator - Faculty of Engineering and Built Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-left-bar">
        <button onclick="window.location.href='index.html'" class="btn-back">
            ← Back
        </button>
    </div>

    <div class="top-right-nav">
        <button class="btn-logout" onclick="logoutUser()">Logout</button>
    </div>

    <header>
       <h1>CGPA Calculator</h1>
       <p>(Faculty of Engineering and Built Environment)</p>
       </header>

    <!-- Program Selection Page -->
    <div id="programSelection" class="container">
        <h2 id="user-greeting">Choose Your Program</h2>
        
    </div>

        <div class="program-buttons">
            <button onclick="window.location.href='calculator-electronic.html'" class="program-btn">
                <h3>Electronic Engineering</h3>
                <p>Bachelor of Electronic Engineering with Honours</p>
            </button>
            
            <button onclick="window.location.href='calculator-electrical.html'" class="program-btn">
                <h3>Electrical Engineering</h3>
                <p>Bachelor of Electrical Engineering with Honours</p>
            </button>
        </div>
    </div>

    <!-- Calculator Page (Hidden initially) -->
    <div id="calculatorPage" class="container" style="display: none;">
        <!-- Back button -->
        <button onclick="goBack()" class="back-btn">← Change Program</button>
        
        <h2 id="programTitle"></h2>

        <!-- Current Semester Selector -->
        <div class="semester-selector">
            <label>I am currently in: </label>
            <select id="currentSemester" onchange="updateVisibleSemesters()">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
            </select>
        <div id="guestModeOptions" class="guest-options" style="display:none;">
            <h3>How do you want to use the calculator?</h3><label>
            <input type="radio" name="guestMode" value="full" checked>
            I want to enter grades for all semesters
        </label>
        <label>
            <input type="radio" name="guestMode" value="single">
            I only want to calculate one semester
        </label>

        <div id="singleSemSelector" style="margin-top:10px; display:none;">
            <label>Choose semester:</label>
            <select id="guestSingleSem">
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3">Semester 3</option>
            <option value="4">Semester 4</option>
            <option value="5">Semester 5</option>
            <option value="6">Semester 6</option>
            <option value="7">Semester 7</option>
            <option value="8">Semester 8</option>
            </select>
                </div>
                <button class="btn-primary" onclick="startGuestCalculator()">   Continue to calculator
            </button>
            </div>
        </div>

        <!-- Semester Tabs -->
        <div class="tabs" id="semesterTabs"></div>

        <!-- Semester Content -->
        <div id="semesterContent"></div>

        <!-- Results Section -->
        <div class="results" id="results">
            <h3>Results</h3>
            <div class="result-box">
                <div class="result-item">
                    <span>Current Semester GPA:</span>
                    <span id="currentGPA" class="gpa-value">-</span>
                </div>
                <div class="result-item cgpa-main">
                    <span>Overall CGPA:</span>
                    <span id="overallCGPA" class="cgpa-value">-</span>
                </div>
            </div>
            <div id="dekanMessage" class="dekan-alert" style="display: none;"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button onclick="calculateAll()" class="btn-primary">Calculate CGPA</button>
            <button onclick="saveData()" class="btn-secondary">Save Data</button>
            <button onclick="clearAll()" class="btn-danger">Reset All</button>
        </div>

        <!-- Prediction Calculator -->
        <div class="prediction-section">
            <h3>🎯 CGPA Prediction Calculator</h3>
            <div class="prediction-input">
                <label>Your desired Target CGPA:</label>
                <input type="number" id="targetCGPA" min="0" max="4" step="0.01" placeholder="Example: 3.75">
                <button onclick="predictGrades()" class="btn-predict">Predict Required Grades</button>
            </div>
            <div id="predictionResults" class="prediction-results"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 | Developed by Hasyf</p>
    </footer>

    <!-- Load data & logic -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script src="auth.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</body>
</html>
