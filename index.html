<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGPA Calculator - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>CGPA CALCULATOR</h1>
    <p>Track your academic progress</p>
  </header>

  <div class="home-container">
        <h2 style="text-align: center; margin-bottom: 25px; color: #5bc0be;">Welcome</h2>

        <div class="auth-form">
            <input type="text" id="login-matrik" placeholder="Matric No. (e.g., 1222017)" required>
            <input type="password" id="login-pw" placeholder="Password" required>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="btn-login" class="btn-primary" style="flex: 1;">Login</button>
                <a href="register.html" class="btn-secondary" style="flex: 1; text-decoration: none; text-align: center; line-height: 2.5;">Register</a>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <a href="javascript:void(0)" onclick="forgotPassword()" style="color: #5bc0be; font-size: 0.85rem; text-decoration: none; opacity: 0.8;">
                    Forgot password?
                </a>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <a href="#" id="btn-guest" style="color: #5bc0be; text-decoration: none; font-size: 0.9em; transition: color 0.3s ease;">Continue as Guest</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script src="auth.js"></script>

</body>
</html>
