<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="theme-color" content="#0B132B">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Register Account - CGPA Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=6.0">
</head>

<body style="background-color: #0B132B; margin: 0; padding: 0; box-sizing: border-box;">

    <div class="register-wrapper">
        <div class="register-card">
            <div class="register-header">
                <h2>Register Account</h2>
                <p>Create an account to save your CGPA records</p>
            </div>

            <form id="registerForm">
                
                <div class="custom-input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="reg-nama" placeholder="Example: MUHAMMAD HASIF" required>
                    </div>
                </div>

                <div class="custom-input-group">
                    <label>Student ID (Matric No.)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🆔</span>
                        <input type="text" id="regId" placeholder="Example: 1222017" required>
                    </div>
                </div>
                
                <div class="custom-input-group">
                    <label>Personal Email (Gmail)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="regEmail" placeholder="student@gmail.com" required>
                    </div>
                </div>

                <div class="custom-input-group">
                    <label>Study Program</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🎓</span>
                        <select id="regProgram" required>
                            <option value="" disabled selected>-- Please Select Program --</option>
                            <option value="Kejuruteraan Elektronik">Electronic Engineering (QK86)</option>
                            <option value="Kejuruteraan Elektrik">Electrical Engineering (QK87)</option>
                        </select>
                    </div>
                </div>

                <div class="custom-input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPass" placeholder="Minimum 6 characters" required>
                        <span class="password-toggle" onclick="togglePasswordVisibility('regPass', this)">👁️</span>
                    </div>
                </div>

                <div class="custom-input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🛡️</span>
                        <input type="password" id="regPass2" placeholder="Confirm your password" required>
                        <span class="password-toggle" onclick="togglePasswordVisibility('regPass2', this)">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-register-main">Register Now</button>
            </form>

            <div class="register-footer">
                <p>Already have an account? <a href="index.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="auth.js?v=6.0"></script>
    
</body>
</html>
