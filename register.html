<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - CGPA Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
  <div class="home-container">
    <h1>Daftar Akaun</h1>
    <p class="subtitle">Cipta akaun untuk simpan rekod CGPA anda</p>

    <form id="registerForm">
      <input type="text" id="regId" placeholder="ID Pelajar" required>

      <label>Program Pengajian:</label>
      <select id="regProgram" required>
        <option value="">-- Sila Pilih Program --</option>
        <option value="Kejuruteraan Elektronik">Kejuruteraan Elektronik</option>
        <option value="Kejuruteraan Elektrik">Kejuruteraan Elektrik</option>
      </select>

      <input type="password" id="regPass" placeholder="Kata laluan" required>
      <input type="password" id="regPass2" placeholder="Ulang kata laluan" required>

      <button type="submit" class="btn btn-primary">Daftar</button>
    </form>

    <p class="link-text">
      Sudah ada akaun?
      <a href="index.html">Log masuk di sini</a>
    </p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  
  <script src="auth.js"></script>
</body>
</html>
